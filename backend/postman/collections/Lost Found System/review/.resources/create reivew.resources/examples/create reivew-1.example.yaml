$kind: http-example
name: create reivew
request:
  url: "{{base}}/review/create"
  method: POST
  headers:
    "{{auth_key}}": "{{auth_value}}"
  body:
    type: formdata
    content:
      - type: file
        key: image
        src:
          - /D:/baba/insurance cards/malak card.jpg
      - type: text
        key: message
        value: i am review
      - type: text
        key: rate
        value: "5"
      - type: text
        key: product_id
        value: "1"
response:
  statusCode: 201
  statusText: Created
  headers:
    X-Powered-By: Express
    Access-Control-Allow-Origin: "*"
    Content-Type: application/json; charset=utf-8
    Content-Length: "205"
    ETag: W/"cd-C1M8dL5SfR1PlZ7MpcjJwh9At04"
    Date: Mon, 27 Apr 2026 03:02:41 GMT
    Connection: keep-alive
    Keep-Alive: timeout=5
  body:
    type: text
    content: |-
      {
          "message": "Review created successfully",
          "review": {
              "id": 12,
              "message": "i am review",
              "rate": "5",
              "user_id": 59,
              "product_id": "1",
              "updated_at": "2026-04-27T03:02:32.318Z",
              "created_at": "2026-04-27T03:02:32.318Z"
          }
      }
order: 2000
