$kind: http-example
name: add image to item
request:
  url: "{{base}}/item/image/addImages"
  method: POST
  headers:
    "{{auth_key}}": "{{auth_value}}"
  body:
    type: formdata
    content:
      - type: file
        key: images
        src:
          - /D:/baba/insurance cards/malak card.jpg
      - type: text
        key: owner_id
        value: "40"
      - type: text
        key: owner_type
        value: item
response:
  statusCode: 200
  statusText: OK
  headers:
    X-Powered-By: Express
    Access-Control-Allow-Origin: "*"
    Content-Type: application/json; charset=utf-8
    Content-Length: "39"
    ETag: W/"27-VESb/ZSoAc1ghcdilJiA8f9Qls0"
    Date: Mon, 27 Apr 2026 03:21:08 GMT
    Connection: keep-alive
    Keep-Alive: timeout=5
  body:
    type: text
    content: |-
      {
          "message": "Images Added Successfully"
      }
order: 2000
