$kind: http-example
request:
  url: "{{base}}/item/image/addImage"
  method: POST
  headers:
    "{{auth_key}}": "{{auth_value}}"
  body:
    type: json
    content: "{\r

      \    \"item_id\": 33,\r

      \    \"images_url\": [\"firstImage.jpg\"]\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    X-Powered-By: Express
    Access-Control-Allow-Origin: "*"
    Content-Type: application/json; charset=utf-8
    Content-Length: "39"
    ETag: W/"27-VESb/ZSoAc1ghcdilJiA8f9Qls0"
    Date: Tue, 03 Feb 2026 02:09:09 GMT
    Connection: keep-alive
    Keep-Alive: timeout=5
  body:
    type: text
    content: |-
      {
          "message": "Images Added Successfully"
      }
order: 1000
