$kind: http-example
name: create item
request:
  url: "{{base}}/item/create"
  method: POST
  headers:
    "{{auth_key}}": "{{auth_value}}"
  body:
    type: formdata
    content:
      - type: file
        key: images
        src:
          - /D:/baba/insurance cards/malak card.jpg
      - type: text
        key: title
        value: new
      - type: text
        key: government_id
        value: "1"
      - type: text
        key: city_id
        value: "1"
      - type: text
        key: place
        value: transportation
      - type: text
        key: type
        value: found
      - type: text
        key: description
        value: i lost this item help please
      - type: text
        key: category_id
        value: "3"
      - type: text
        key: date
        value: 2025-12-01
response:
  statusCode: 201
  statusText: Created
  headers:
    X-Powered-By: Express
    Access-Control-Allow-Origin: "*"
    Content-Type: application/json; charset=utf-8
    Content-Length: "325"
    ETag: W/"145-GbDYOzVfzOihP/LrOMHLLy+y8SA"
    Date: Mon, 27 Apr 2026 02:46:55 GMT
    Connection: keep-alive
    Keep-Alive: timeout=5
  body:
    type: text
    content: |-
      {
          "message": "Item created Successfully",
          "item": {
              "id": 40,
              "title": "new",
              "government_id": "1",
              "city_id": "1",
              "place": "transportation",
              "type": "found",
              "description": "i lost this item help please",
              "date": "2025-12-01",
              "item_category_id": "3",
              "user_id": 59,
              "updated_at": "2026-04-27T02:46:51.137Z",
              "created_at": "2026-04-27T02:46:51.137Z"
          }
      }
order: 2000
