    type: json
    content: "{\r

      \    \"email\": \"hamo@gmail.com\",\r

      \    \"otp\": \"477365\",\r

      \    \"newPassword\": \"hamo@1234\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    X-Powered-By: Express
    Access-Control-Allow-Origin: "*"
    Content-Type: application/json; charset=utf-8
    Content-Length: "41"
    ETag: W/"29-JLWAnLrf6qmJkXqaEuCQpWt9O0c"
    Date: Thu, 05 Mar 2026 23:10:13 GMT
