$kind: http-example
request:
  url: "{{base}}/user/chagePassword"
  method: PUT
  headers:
    "{{auth_key}}": "{{auth_value}}"
  body:
    type: json
    content: "{\r

      \    \"oldPassword\": \"hamo@123\",\r

      \    \"newPassword\": \"hamo@1234\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    X-Powered-By: Express
    Access-Control-Allow-Origin: "*"
    Content-Type: application/json; charset=utf-8
    Content-Length: "48"
    ETag: W/"30-JF35VCZY1c6kSJL5UBcL7VvL+P4"
    Date: Mon, 29 Dec 2025 13:58:33 GMT
    Connection: keep-alive
    Keep-Alive: timeout=5
  body:
    type: text
    content: |-
      {
          "message": "User password changed successfully"
      }
order: 1000
