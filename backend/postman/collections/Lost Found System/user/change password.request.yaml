$kind: http-request
url: "{{base}}/user/chagePassword"
method: PUT
headers:
  "{{auth_key}}": "{{auth_value}}"
body:
  type: json
  content: "{\r

    \    \"oldPassword\": \"hamo@123\",\r

    \    \"newPassword\": \"hamo@1234\"\r

    }"
examples: ./.resources/change password.resources/examples
order: 8000
